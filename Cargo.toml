[package]
name = "api-abdo"
version = "0.1.0"
edition = "2024"

[dependencies]
mongodb = "3.0.0"
tokio = { version = "1.39", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
dotenvy = "0.15"
async-trait = "0.1"
aes-gcm = "0.10"
sha2 = "0.10"
base64 = "0.22"
jsonwebtoken = { version = "10", features = ["rust_crypto"] }
uuid = {version = "1", features=["v4"]}
time = "0.3"
hmac = "0.12.1"
futures = "0.3.31"
rand = "0.9.2"
chrono = { version = "0.4", features = ["serde"] }
